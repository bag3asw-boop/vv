<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link id="theme-style" rel="stylesheet" href="style.css" />
    <title>Sign In | Your Library</title>
  </head>
  <body class="account-page">
    <header class="head">
      <a class="logo" href="../Yo/index.html" aria-label="Your Library home">
        <img src="YOUR LIBRARY.svg" alt="Your Library" />
      </a>

      <nav class="links" aria-label="Main navigation">
        <a href="../index.html" class="act">Home</a>
        <a href="../EZZ/Explore.html">Explore</a>
        <a href="../El-bara/myshelf.html">My Shelf</a>
        <a href="../AD-co/Contact.html">Contact Us</a>
        <a href="../Z/about.html">About Us</a>
      </nav>

      <div class="search">
        <div class="li" aria-label="Theme switcher">
          <button
            class="theme-btn"
            type="button"
            data-theme="light"
            aria-label="Light theme"
          >
            <img src="sun-alt-svgrepo-com.svg" alt="" />
          </button>
          <button
            class="theme-btn"
            type="button"
            data-theme="dark"
            aria-label="Dark theme"
          >
            <img src="moon-svgrepo-com.svg" alt="" />
          </button>
        </div>
        <span class="divider" aria-hidden="true"></span>
        <div class="ri">
          <a href="../Omar/cart.html" aria-label="Cart"
            ><img src="cart-svgrepo-com (2).svg" alt=""
          /></a>
          <a href="sign-in.html" aria-label="Profile"
            ><img src="profile-1341-svgrepo-com.svg" alt=""
          /></a>
        </div>
      </div>
    </header>

    <main class="account-main">
      <section class="account-visual" aria-label="Library preview"></section>

      <section class="account-panel" aria-labelledby="signin-title">
        <h1 id="signin-title">Welcome Back</h1>
        <p>
          Sign in to return to your shelf and continue your reading journey.
        </p>

        <form class="account-form" action="#" method="post">
          <label for="login-email">Email Address</label>
          <input
            id="login-email"
            name="email"
            type="email"
            placeholder="example@library.com"
            autocomplete="email"
            required
          />

          <label for="login-password">Password</label>
          <input
            id="login-password"
            name="password"
            type="password"
            placeholder="********"
            autocomplete="current-password"
            required
          />

          <div class="form-row">
            <label class="check-row compact" for="remember">
              <input id="remember" name="remember" type="checkbox" />
              <span>Remember me</span>
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button class="primary-btn account-submit" type="submit">
            Sign In
          </button>

          <div class="or-line"><span>Or continue with</span></div>

          <button class="google-btn" type="button">
            <span>G</span>
            Google
          </button>
        </form>

        <p class="account-switch">
          Do not have an account? <a href="sign-up.html">Sign up</a>
        </p>
      </section>
    </main>

    <hr class="c" />
    <footer class="foot">
      <div class="left">
        <img src="YOUR LIBRARY.svg" alt="Your Library" />
        <p>&copy; 2024 Your Library. All rights reserved.</p>
      </div>
      <div class="right">
        <a href="#">Institutional info</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="../AD-co/Contact.html">Contact Us</a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
